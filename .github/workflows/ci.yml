name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Build
        run: |
          xcodebuild -workspace Flasher.xcworkspace \
            -scheme Flasher \
            -configuration Debug \
            -derivedDataPath build \
            build

      - name: Swift Package Tests
        run: |
          cd FlasherPackage
          swift test
